<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Choferes</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f0f4f8; }
  #topbar { background: #1e3a5f; color: #fff; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; z-index: 2000; position: relative; }
  #topbar h1 { font-size: 16px; font-weight: 600; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .cbadge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; opacity: 0.4; transition: opacity 0.3s; }
  .cbadge.on { opacity: 1; }
  .c1b { background: #93c5fd; color: #1e3a5f; }
  .c2b { background: #86efac; color: #14532d; }
  .c3b { background: #fcd34d; color: #78350f; }
  .c4b { background: #f9a8d4; color: #831843; }
  #map { height: calc(100vh - 52px); width: 100%; }
  #panel { position: absolute; top: 62px; left: 10px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; max-width: 220px; }
  .chofer-card { background: #fff; border-radius: 10px; padding: 10px 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.12); border-left: 4px solid #ccc; opacity: 0.5; transition: opacity 0.3s; }
  .chofer-card.on { opacity: 1; }
  .chofer-card h4 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .chofer-card .row { display: flex; justify-content: space-between; font-size: 11px; color: #555; padding: 2px 0; }
  .chofer-card .row span:last-child { font-weight: 600; color: #111; }
  .dot-s { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; background: #ccc; vertical-align: middle; }
  .dot-s.on { background: #22c55e; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .btn-center { position: absolute; bottom: 20px; right: 16px; z-index: 1000; background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-center:hover { background: #1d4ed8; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🗺️ Monitor de Choferes</h1>
  <div class="badges">
    <span class="cbadge c1b" id="b1">Chofer 1</span>
    <span class="cbadge c2b" id="b2">Chofer 2</span>
    <span class="cbadge c3b" id="b3">Chofer 3</span>
    <span class="cbadge c4b" id="b4">Chofer 4</span>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <div class="chofer-card" id="card1" style="border-left-color:#3b82f6;">
    <h4><span class="dot-s" id="dot1"></span>Chofer 1</h4>
    <div class="row"><span>Velocidad</span><span id="spd1">--</span></div>
    <div class="row"><span>Precisión</span><span id="acc1">--</span></div>
    <div class="row"><span>Actualizado</span><span id="time1">--</span></div>
  </div>
  <div class="chofer-card" id="card2" style="border-left-color:#22c55e;">
    <h4><span class="dot-s" id="dot2"></span>Chofer 2</h4>
    <div class="row"><span>Velocidad</span><span id="spd2">--</span></div>
    <div class="row"><span>Precisión</span><span id="acc2">--</span></div>
    <div class="row"><span>Actualizado</span><span id="time2">--</span></div>
  </div>
  <div class="chofer-card" id="card3" style="border-left-color:#f59e0b;">
    <h4><span class="dot-s" id="dot3"></span>Chofer 3</h4>
    <div class="row"><span>Velocidad</span><span id="spd3">--</span></div>
    <div class="row"><span>Precisión</span><span id="acc3">--</span></div>
    <div class="row"><span>Actualizado</span><span id="time3">--</span></div>
  </div>
  <div class="chofer-card" id="card4" style="border-left-color:#ec4899;">
    <h4><span class="dot-s" id="dot4"></span>Chofer 4</h4>
    <div class="row"><span>Velocidad</span><span id="spd4">--</span></div>
    <div class="row"><span>Precisión</span><span id="acc4">--</span></div>
    <div class="row"><span>Actualizado</span><span id="time4">--</span></div>
  </div>
</div>

<button class="btn-center" onclick="centrarTodos()">Ver todos</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const FIREBASE_CONFIG = {
    apiKey: "AIzaSyCGTk3_Ox56EdkC1g-lYaPUhKxGiCLXiX4",
    databaseURL: "https://rastreo-chofer-70dac-default-rtdb.firebaseio.com"
  };

  const map = L.map('map').setView([-17.7863, -63.1812], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  const colores = ['#3b82f6','#22c55e','#f59e0b','#ec4899'];
  const markers = [null,null,null,null];
  const polylines = [null,null,null,null];
  const historiales = [[],[],[],[]];
  const activos = [false,false,false,false];

  function makeIcon(color, num) {
    return L.divIcon({
      html: `<div style="background:${color};border:3px solid #fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,0.3)">${num}</div>`,
      iconSize:[26,26], iconAnchor:[13,13], className:''
    });
  }

  const app = initializeApp(FIREBASE_CONFIG, 'monitor');
  const db = getDatabase(app);

  for (let i = 1; i <= 4; i++) {
    const idx = i - 1;
    const locRef = ref(db, 'choferes/chofer' + i);
    onValue(locRef, snap => {
      const data = snap.val();
      if (!data || !data.lat) return;

      const latlng = [data.lat, data.lng];

      if (!markers[idx]) {
        markers[idx] = L.marker(latlng, { icon: makeIcon(colores[idx], i) })
          .addTo(map)
          .bindPopup(`<b>Chofer ${i}</b><br>${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}`);
      } else {
        markers[idx].setLatLng(latlng);
        markers[idx].getPopup().setContent(`<b>Chofer ${i}</b><br>Vel: ${data.speed} km/h<br>${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}`);
      }

      historiales[idx].push(latlng);
      if (historiales[idx].length > 150) historiales[idx].shift();
      if (polylines[idx]) polylines[idx].remove();
      polylines[idx] = L.polyline(historiales[idx], { color: colores[idx], weight: 3, opacity: 0.45 }).addTo(map);

      const activo = data.activo === true;
      activos[idx] = activo;

      document.getElementById('dot' + i).className = 'dot-s' + (activo ? ' on' : '');
      document.getElementById('card' + i).className = 'chofer-card' + (activo ? ' on' : '');
      document.getElementById('b' + i).className = 'cbadge c' + i + 'b' + (activo ? ' on' : '');
      document.getElementById('spd' + i).textContent = (data.speed || 0) + ' km/h';
      document.getElementById('acc' + i).textContent = (data.accuracy || '--') + ' m';
      document.getElementById('time' + i).textContent = new Date(data.timestamp).toLocaleTimeString('es-BO');
    });
  }

  window.centrarTodos = function() {
    const puntos = markers.filter(m => m !== null).map(m => m.getLatLng());
    if (puntos.length > 0) map.fitBounds(L.latLngBounds(puntos), { padding: [40,40] });
  };
</script>
</body>
</html>
